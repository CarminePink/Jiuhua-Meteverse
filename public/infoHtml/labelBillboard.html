<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>点位详情</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                overflow: hidden;
                font-family: '微软雅黑', 'Microsoft YaHei', sans-serif;
            }

            .label-billboard-container {
                position: relative;
                width: 537px;
                height: 280px;
                border-radius: 10px;
                border: 1.5px solid rgba(252, 223, 165, 0.00);
                background: rgba(7, 51, 91, 0.70);
                backdrop-filter: blur(2.5px);
                overflow: hidden;
            }

            .close-btn {
                position: absolute;
                top: 12px;
                right: 12px;
                width: 28px;
                height: 28px;
                border: 2px solid rgba(255, 255, 255, 0.6);
                border-radius: 50%;
                color: #fff;
                font-size: 16px;
                line-height: 1;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                background: transparent;
            }

            .close-btn:hover {
                background: rgba(255, 255, 255, 0.15);
            }

            .content-wrapper {
                padding: 50px 20px 25px 20px;
                display: flex;
                flex-direction: column;
                height: 100%;
            }

            .title-area {
                position: relative;
                display: inline-block;
                margin-bottom: 20px;
                align-self: flex-start;
            }

            .title-bg {
                position: absolute;
                top: 50%;
                left: -8px;
                transform: translateY(-50%);
                height: 70px;
                width: 263px;
                background: url('../images/bg_title.png') no-repeat center center;
                background-size: 100% 100%;
                z-index: 0;
            }

            .title-text {
                position: relative;
                z-index: 1;
                color: #FFF;
                text-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
                font-size: 20px;
                font-weight: 700;
                line-height: 150%;
                margin: 0 0 5px 15px;
            }

            .description-area {
                flex: 1;
                overflow-y: auto;
            }

            .description-area::-webkit-scrollbar {
                width: 4px;
            }

            .description-area::-webkit-scrollbar-track {
                background: transparent;
            }

            .description-area::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.3);
                border-radius: 2px;
            }

            .description-text {
                color: #FFF;
                text-align: justify;
                font-size: 20px;
                font-weight: 400;
                line-height: 150%;
                text-indent: 2em;
            }
        </style>
    </head>

    <body>
        <div class="label-billboard-container">
            <button class="close-btn" onclick="window.close()">&#x2715;</button>
            <div class="content-wrapper">
                <div class="title-area">
                    <div class="title-bg"></div>
                    <div class="title-text" id="title-text"></div>
                </div>
                <div class="description-area">
                    <p class="description-text" id="description-text"></p>
                </div>
            </div>
        </div>
        <script>
            window.onload = function () {
                var query = window.location.search.substring(1)
                let item = getQuery(query)
                if (item.name) {
                    document.getElementById('title-text').textContent = item.name
                }
                if (item.description) {
                    document.getElementById('description-text').textContent = item.description
                }
            }

            // 获取路径传参
            function getQuery(url) {
                const urlParams = decodeURIComponent(url)
                const result = {}
                const arr = urlParams.split('&')
                for (let i = 0; i < arr.length; i++) {
                    const item = arr[i].split('=')
                    result[item[0]] = item[1]
                }
                return result
            }
        </script>
    </body>
</html>
