<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点位名称</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .modal-container {
            position: relative;
            width: 476px;
            height: 80px;
            color: #FFF;
            text-align: center;
        }

        .info-content {
            text-align: center;
            border-radius: 61px;
            background: rgba(0, 0, 0, 0.90);
            color: #FFF;
            font-size: 51px;
            padding: 3px 70px;
            display: inline-block;
            margin: 0 auto;
        }
    </style>
</head>

<body style="overflow: hidden;">
    <div class="modal-container">
        <div class="info-content">
            <div id="infoName" class="info-text"></div>
        </div>
    </div>
    <script>
        // 获取url上的参数
        function getQueryVariable(variable) {
            var query = window.location.search.substring(1);
            var vars = query.split("&");
            for (var i = 0; i < vars.length; i++) {
                var pair = vars[i].split("=");
                if (pair[0] == variable) {
                    return decodeURIComponent(pair[1]);
                }
            }
            return (false);
        }
        if (getQueryVariable('name')) {
            document.getElementById("infoName").innerHTML = getQueryVariable('name')
        }
        if (getQueryVariable('zoomScale')) {
            document.querySelector('.modal-container').style.zoom = getQueryVariable('zoomScale')
        }
    </script>
</body>

</html>
